<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>bread for myself — 製パン化学反応ネットワーク</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0f0e;
  --bg2: #131815;
  --bg3: #1a1f1c;
  --panel: #1e2520;
  --border: #2e3830;
  --accent: #b5e853;
  --accent2: #53e8b5;
  --accent3: #e8b553;
  --accent4: #e85353;
  --text: #e8ede9;
  --text2: #9aaa9c;
  --text3: #5a6b5c;
  
  /* step colors */
  --mixing: #4a9eff;
  --ferm1: #b5e853;
  --bench: #53e8b5;
  --proof: #e8b553;
  --baking: #e85353;
  --shaping: #c853e8;
  --dividing: #53b5e8;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Space Mono', monospace;
  overflow: hidden;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── Header ── */
#header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  gap: 16px;
}
#header h1 {
  font-family: 'Shippori Mincho', serif;
  font-size: 15px;
  font-weight: 800;
  color: var(--accent);
  letter-spacing: 0.05em;
  white-space: nowrap;
}
#header h1 span { color: var(--text2); font-weight: 400; font-size: 12px; margin-left: 8px; }

.header-stats {
  display: flex; gap: 16px; flex-shrink: 0;
}
.stat {
  display: flex; flex-direction: column; align-items: center;
  font-size: 10px; color: var(--text3);
  line-height: 1.2;
}
.stat strong { font-size: 16px; color: var(--accent); font-family: 'Space Mono', monospace; }

.nav-tabs {
  display: flex; gap: 4px;
}
.nav-tab {
  padding: 6px 14px;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text2);
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  cursor: pointer;
  transition: all 0.2s;
  border-radius: 2px;
  white-space: nowrap;
}
.nav-tab:hover { border-color: var(--accent); color: var(--accent); }
.nav-tab.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }

/* ── Main layout ── */
#main {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ── Sidebar ── */
#sidebar {
  width: 280px;
  flex-shrink: 0;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sidebar-section {
  padding: 12px 14px;
  border-bottom: 1px solid var(--border);
}
.sidebar-section h3 {
  font-size: 10px;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.12em;
  margin-bottom: 8px;
}

#search-input {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  padding: 7px 10px;
  outline: none;
  border-radius: 2px;
  transition: border-color 0.2s;
}
#search-input:focus { border-color: var(--accent); }
#search-input::placeholder { color: var(--text3); }

.filter-group { display: flex; flex-wrap: wrap; gap: 4px; }
.filter-btn {
  padding: 3px 8px;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text2);
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  cursor: pointer;
  border-radius: 2px;
  transition: all 0.15s;
}
.filter-btn:hover { border-color: var(--accent2); color: var(--accent2); }
.filter-btn.active { background: var(--accent2); color: var(--bg); border-color: var(--accent2); }

.step-legend { display: flex; flex-direction: column; gap: 5px; }
.step-item {
  display: flex; align-items: center; gap: 8px;
  font-size: 10px; color: var(--text2);
  cursor: pointer; padding: 2px 4px; border-radius: 2px;
  transition: background 0.15s;
}
.step-item:hover { background: var(--bg3); }
.step-item.active { background: var(--bg3); }
.step-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.step-count { margin-left: auto; color: var(--text3); }

#detail-panel {
  flex: 1;
  overflow-y: auto;
  padding: 14px;
}
#detail-panel::-webkit-scrollbar { width: 4px; }
#detail-panel::-webkit-scrollbar-track { background: transparent; }
#detail-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.detail-empty {
  color: var(--text3);
  font-size: 11px;
  line-height: 1.8;
  margin-top: 20px;
}

.detail-card { }
.detail-id { font-size: 10px; color: var(--text3); margin-bottom: 4px; }
.detail-name { font-size: 14px; color: var(--accent); font-family: 'Shippori Mincho', serif; font-weight: 600; margin-bottom: 4px; }
.detail-formula {
  font-size: 11px; color: var(--accent2);
  background: var(--bg3); padding: 3px 8px; border-radius: 2px;
  display: inline-block; margin-bottom: 10px;
}
.detail-row { display: flex; gap: 8px; margin-bottom: 4px; font-size: 10px; }
.detail-label { color: var(--text3); min-width: 80px; flex-shrink: 0; }
.detail-value { color: var(--text2); }

.detail-section { margin-top: 10px; }
.detail-section-title { font-size: 9px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px; }

.snapshot-bar-wrap { display: flex; flex-direction: column; gap: 3px; }
.snapshot-bar-row { display: flex; align-items: center; gap: 6px; font-size: 9px; }
.snapshot-bar-label { color: var(--text3); min-width: 60px; }
.snapshot-bar { flex: 1; height: 4px; background: var(--bg3); border-radius: 2px; overflow: hidden; }
.snapshot-bar-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s; }
.snapshot-bar-val { color: var(--text2); min-width: 50px; text-align: right; }

.badge {
  display: inline-block; font-size: 9px; padding: 2px 6px;
  border-radius: 2px; margin: 2px;
}
.badge-step { color: var(--bg); }

/* ── Graph area ── */
#graph-area {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: var(--bg);
}

#graph-canvas {
  position: absolute;
  inset: 0;
}

#tooltip {
  position: absolute;
  background: rgba(19,24,21,0.95);
  border: 1px solid var(--border);
  padding: 8px 12px;
  font-size: 11px;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.15s;
  max-width: 240px;
  z-index: 100;
  border-radius: 2px;
  backdrop-filter: blur(8px);
}
#tooltip .tt-name { color: var(--accent); font-weight: bold; margin-bottom: 2px; }
#tooltip .tt-sub  { color: var(--text2); }

/* Controls overlay */
#controls {
  position: absolute;
  bottom: 16px;
  right: 16px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  z-index: 50;
}
.ctrl-btn {
  width: 32px; height: 32px;
  background: var(--panel);
  border: 1px solid var(--border);
  color: var(--text2);
  font-family: 'Space Mono', monospace;
  font-size: 16px;
  cursor: pointer;
  border-radius: 2px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.ctrl-btn:hover { border-color: var(--accent); color: var(--accent); }

/* Stage timeline */
#stage-bar {
  position: absolute;
  top: 12px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 0;
  z-index: 50;
  border: 1px solid var(--border);
  border-radius: 2px;
  overflow: hidden;
}
.stage-pill {
  padding: 5px 12px;
  font-size: 10px;
  font-family: 'Space Mono', monospace;
  cursor: pointer;
  background: var(--panel);
  color: var(--text2);
  border-right: 1px solid var(--border);
  transition: all 0.15s;
  white-space: nowrap;
}
.stage-pill:last-child { border-right: none; }
.stage-pill:hover { color: var(--text); background: var(--bg3); }
.stage-pill.active { color: var(--bg); }

/* Info overlay */
#info-bar {
  position: absolute;
  bottom: 16px;
  left: 16px;
  font-size: 10px;
  color: var(--text3);
  z-index: 50;
  line-height: 1.8;
}

/* ── Views ── */
.view { display: none; }
.view.active { display: flex; flex: 1; overflow: hidden; }

/* Params view */
#params-view {
  padding: 24px;
  overflow-y: auto;
  flex-wrap: wrap;
  align-content: flex-start;
  gap: 16px;
}
#params-view::-webkit-scrollbar { width: 4px; }
#params-view::-webkit-scrollbar-thumb { background: var(--border); }

.param-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 16px;
  width: calc(33.33% - 12px);
  min-width: 260px;
  transition: border-color 0.2s;
}
.param-card:hover { border-color: var(--accent); }
.param-id { font-size: 10px; color: var(--text3); margin-bottom: 4px; }
.param-name { font-size: 14px; color: var(--accent); font-family: 'Shippori Mincho', serif; font-weight: 600; margin-bottom: 10px; }
.param-slider-wrap { margin-bottom: 12px; }
.param-slider {
  width: 100%;
  -webkit-appearance: none;
  height: 3px;
  background: var(--border);
  outline: none;
  border-radius: 2px;
}
.param-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--accent);
  cursor: pointer;
}
.param-val-row { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 6px; }
.param-unit { color: var(--text3); }
.param-val-display { color: var(--accent); font-weight: bold; }
.param-range { color: var(--text3); font-size: 10px; }

.param-affects { margin-top: 8px; }
.param-affects-title { font-size: 9px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px; }
.affect-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; font-size: 10px; }
.affect-rxn { color: var(--accent2); min-width: 40px; }
.affect-bar { flex: 1; height: 4px; background: var(--bg3); border-radius: 2px; overflow: hidden; }
.affect-fill { height: 100%; border-radius: 2px; }
.affect-label { color: var(--text3); font-size: 9px; min-width: 40px; }

/* Substances table view */
#substances-view {
  flex-direction: column;
  overflow: hidden;
}
#sub-table-wrap {
  flex: 1;
  overflow-y: auto;
  padding: 0;
}
#sub-table-wrap::-webkit-scrollbar { width: 4px; }
#sub-table-wrap::-webkit-scrollbar-thumb { background: var(--border); }
.sub-table { width: 100%; border-collapse: collapse; font-size: 11px; }
.sub-table th {
  background: var(--bg2);
  color: var(--text3);
  text-align: left;
  padding: 8px 12px;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  position: sticky; top: 0;
  border-bottom: 1px solid var(--border);
  font-weight: 400;
}
.sub-table td {
  padding: 7px 12px;
  border-bottom: 1px solid var(--border);
  color: var(--text2);
}
.sub-table tr:hover td { background: var(--bg3); cursor: pointer; }
.sub-table .td-name { color: var(--text); }
.sub-table .td-formula { color: var(--accent2); font-size: 10px; }
.sub-table .td-id { color: var(--text3); font-size: 10px; }
.sub-table .td-volatile { color: var(--accent3); font-size: 10px; }
.sub-table .td-roles { font-size: 10px; }
.sub-table-header {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 16px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.sub-table-header input {
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  padding: 6px 10px;
  border-radius: 2px;
  outline: none;
  width: 220px;
}
.sub-table-header input:focus { border-color: var(--accent); }

/* Reactions view */
#reactions-view {
  flex-direction: column;
  overflow: hidden;
}
#rxn-grid { 
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 12px;
  align-content: start;
}
#rxn-grid::-webkit-scrollbar { width: 4px; }
#rxn-grid::-webkit-scrollbar-thumb { background: var(--border); }

.rxn-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 14px;
  cursor: pointer;
  transition: border-color 0.2s;
}
.rxn-card:hover { border-color: var(--accent); }
.rxn-step-badge {
  display: inline-block;
  font-size: 9px; padding: 2px 6px;
  border-radius: 2px; color: var(--bg);
  margin-bottom: 6px;
}
.rxn-id { font-size: 11px; color: var(--text3); }
.rxn-name { font-size: 13px; color: var(--text); font-family: 'Shippori Mincho', serif; font-weight: 600; margin: 4px 0; }
.rxn-eq { font-size: 10px; color: var(--text3); line-height: 1.5; margin-top: 4px; }
.rxn-subs { font-size: 10px; color: var(--text2); margin-top: 6px; }

/* Scrollbar global */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

</style>
</head>
<body>

<!-- Header -->
<div id="header">
  <h1>bread for myself <span>製パン化学反応ネットワーク</span></h1>
  <div class="header-stats">
    <div class="stat"><strong id="stat-sub">290</strong>物質</div>
    <div class="stat"><strong id="stat-rxn">75</strong>反応</div>
    <div class="stat"><strong id="stat-edge">415</strong>接続</div>
    <div class="stat"><strong id="stat-param">14</strong>パラメーター</div>
  </div>
  <div class="nav-tabs">
    <button class="nav-tab active" data-view="graph">グラフ</button>
    <button class="nav-tab" data-view="reactions">反応一覧</button>
    <button class="nav-tab" data-view="substances">物質一覧</button>
    <button class="nav-tab" data-view="params">パラメーター</button>
  </div>
</div>

<!-- Main -->
<div id="main">

  <!-- ── GRAPH VIEW ── -->
  <div class="view active" id="graph-view" style="flex:1;overflow:hidden;position:relative;">
    
    <!-- Sidebar -->
    <div id="sidebar">
      <div class="sidebar-section">
        <h3>物質を検索</h3>
        <input id="search-input" type="text" placeholder="物質名 / 化学式 / ID…">
      </div>
      <div class="sidebar-section">
        <h3>揮発性フィルター</h3>
        <div class="filter-group">
          <button class="filter-btn active" data-filter="all">すべて</button>
          <button class="filter-btn" data-filter="volatile">香気物質のみ</button>
          <button class="filter-btn" data-filter="nonvolatile">非揮発のみ</button>
        </div>
      </div>
      <div class="sidebar-section">
        <h3>工程フィルター</h3>
        <div class="step-legend" id="step-legend"></div>
      </div>
      <div id="detail-panel">
        <div class="detail-empty">
          ノードをクリックすると<br>詳細が表示されます。<br><br>
          ドラッグでパン、<br>スクロールでズーム。
        </div>
      </div>
    </div>

    <!-- Graph canvas wrapper -->
    <div id="graph-area">
      <svg id="graph-canvas"></svg>

      <!-- Stage bar -->
      <div id="stage-bar">
        <div class="stage-pill active" data-step="all" style="color:var(--text);">全工程</div>
        <div class="stage-pill" data-step="mixing" style="--c:var(--mixing)">ミキシング</div>
        <div class="stage-pill" data-step="fermentation_1" style="--c:var(--ferm1)">一次発酵</div>
        <div class="stage-pill" data-step="dividing" style="--c:var(--dividing)">分割</div>
        <div class="stage-pill" data-step="bench" style="--c:var(--bench)">ベンチ</div>
        <div class="stage-pill" data-step="shaping" style="--c:var(--shaping)">成形</div>
        <div class="stage-pill" data-step="proof" style="--c:var(--proof)">ホイロ</div>
        <div class="stage-pill" data-step="baking" style="--c:var(--baking)">焼成</div>
      </div>

      <!-- Controls -->
      <div id="controls">
        <button class="ctrl-btn" id="zoom-in" title="ズームイン">+</button>
        <button class="ctrl-btn" id="zoom-out" title="ズームアウト">−</button>
        <button class="ctrl-btn" id="zoom-reset" title="リセット" style="font-size:11px">⌂</button>
      </div>

      <!-- Info -->
      <div id="info-bar">
        <span id="info-text">全 <span id="info-node-count">–</span> ノード / <span id="info-edge-count">–</span> エッジ表示中</span>
      </div>
    </div>
  </div>

  <!-- ── REACTIONS VIEW ── -->
  <div class="view" id="reactions-view" style="width:100%;">
    <div class="sub-table-header">
      <input type="text" id="rxn-search" placeholder="反応名 / ID / 工程を検索…">
      <div class="filter-group" id="rxn-step-filter"></div>
    </div>
    <div id="rxn-grid"></div>
  </div>

  <!-- ── SUBSTANCES VIEW ── -->
  <div class="view" id="substances-view" style="width:100%;">
    <div class="sub-table-header">
      <input type="text" id="sub-search" placeholder="物質名 / 化学式 / IDを検索…">
      <span style="font-size:10px;color:var(--text3);" id="sub-count-label"></span>
    </div>
    <div id="sub-table-wrap">
      <table class="sub-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>物質名</th>
            <th>化学式</th>
            <th>香気</th>
            <th>栄養カテゴリ</th>
            <th>反応関与数</th>
          </tr>
        </thead>
        <tbody id="sub-tbody"></tbody>
      </table>
    </div>
  </div>

  <!-- ── PARAMS VIEW ── -->
  <div class="view" id="params-view" style="width:100%;"></div>

</div>

<!-- Tooltip -->
<div id="tooltip">
  <div class="tt-name" id="tt-name"></div>
  <div class="tt-sub" id="tt-sub"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="js/app.js"></script>
</body>
</html>
